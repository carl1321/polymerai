name: Backend integration (async_tasks)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-integration-tests.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "backend/**"
      - ".github/workflows/backend-integration-tests.yml"

concurrency:
  group: backend-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-integration:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: deerflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deerflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/deerflow_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies (postgres extra for asyncpg)
        working-directory: backend
        run: uv sync --group dev --extra postgres

      - name: Run integration-marked pytest
        working-directory: backend
        run: PYTHONPATH=. uv run pytest -m integration -q
