# vasp-skills 项目级配置模板
# 复制到 /mnt/skills/public/_shared-vasp/config.yaml 后按需修改
#
# HPC 凭据统一放在 /mnt/skills/public/_shared-vasp/profiles.yaml（vasp-skills + gaussian-skills 共享）。
# 本文件只放：选哪个 profile + 项目专属设置（错误处理、POTCAR、默认基组）。
# 详细见 _shared-vasp/HPC.md。

# 引用 /mnt/skills/public/_shared-vasp/profiles.yaml 里的 profile 名（须与其中某条 profile 键一致）。
# 省略时使用 /mnt/skills/public/_shared-vasp/profiles.yaml 的 default_profile。
# 仓库内 profiles 若含 cancon-wenliyang-scnet，可填其名；否则可用 hpc-profiles.template 里的 scnet-h100 等。
profile: cancon-wenliyang-scnet
# 显式默认：所有 vasp-* 计算提交 SCNet API（非本地跑 VASP）。本地调试可改 local 或 CLI --executor local。
executor: scnet

# 错误处理
handlers:
  enabled: true
  max_errors: 5
  strategies:
    - custodian               # custodian 自带
    - vasp_skills_extended    # 本项目移植自 vasp-agent 的 30+ 模式

# POTCAR 来源
potcar:
  backend: vasp-potcar        # vasp-potcar | pymatgen
  functional: PBE             # PBE | PBE_54 | LDA

# 临时调试时可以在这里覆盖 profile 字段（不推荐长期使用）
# ssh:
#   walltime: "72:00:00"
