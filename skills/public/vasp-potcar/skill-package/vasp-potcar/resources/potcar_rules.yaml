# ============================================================
# 计算场景规则
# ============================================================
scenario_rules:
  battery_cathode:
    description: "电池正极材料（如LiFePO4, LiCoO2）"
    element_overrides:
      Li: "Li_sv"
      Fe: "Fe_pv"
      Co: "Co"
      Ni: "Ni_pv"
      Mn: "Mn_pv"
    notes: "锂离子电池材料建议使用半芯态赝势提高精度"

  perovskite:
    description: "钙钛矿材料（ABO3结构）"
    element_overrides:
      Ca: "Ca_sv"
      Sr: "Sr_sv"
      Ba: "Ba_sv"
      Ti: "Ti_pv"
      Zr: "Zr_sv"
    notes: "钙钛矿需要准确描述A位阳离子"

  magnetic:
    description: "磁性材料计算"
    element_overrides:
      Fe: "Fe_pv"
      Co: "Co_pv"
      Ni: "Ni_pv"
      Mn: "Mn_pv"
      Cr: "Cr_pv"
    notes: "磁性计算需要_pv或_sv以正确描述自旋极化"

  semiconductor:
    description: "半导体材料"
    element_overrides:
      Ga: "Ga_d"
      Ge: "Ge_d"
      In: "In_d"
      Sn: "Sn_d"
    notes: "III-V和IV族半导体需要_d赝势"

  catalyst:
    description: "催化剂表面计算"
    element_overrides:
      Pt: "Pt"
      Pd: "Pd"
      Rh: "Rh_pv"
      Ru: "Ru_pv"
    notes: "贵金属催化剂标准赝势通常足够"

  rare_earth:
    description: "稀土化合物"
    use_fixed_valence: true
    notes: |
      - 如果已知稀土元素价态且不关心f磁性，使用_2或_3
      - 需要描述f电子磁性时使用标准赝势，但需注意DFT精度限制

  high_pressure:
    description: "高压计算"
    prefer_hard: true
    notes: "高压下建议使用_pv或_sv赝势，可能需要更高ENCUT"

  gw_optical:
    description: "GW或光学性质计算"
    use_gw_potentials: true
    notes: "必须使用_GW赝势"

